site:
  name: "AIwind"
  site: 'https://helia.us.ci'   # 等部署完后改成你的真实地址
  base: '/'
  trailingSlash: false

metadata:
  title:
    default: AIwind
    template: '%s — AIwind'
  description: "AI 驱动未来 | 智能工具、模型洞见、前沿应用一站式探索平台"
  robots:
    index: true
    follow: true
  openGraph:
    site_name: AIwind
    images:
      - url: '~/assets/images/ai-hero.jpg'
        width: 1200
        height: 628
    type: website
  twitter:
    handle: ''
    site: ''
    cardType: summary_large_image

i18n:
  language: zh          # 默认语言为中文
  textDirection: ltr
  languages:
    - code: zh
      label: 中文
      hrefLang: zh-CN
    - code: en
      label: English
      hrefLang: en

apps:
  blog:
    isEnabled: true
    postsPerPage: 6

    post:
      isEnabled: true
      permalink: '/%slug%'
      robots:
        index: true

    list:
      isEnabled: true
      pathname: 'blog'
      robots:
        index: true

    category:
      isEnabled: true
      pathname: 'category'
      robots:
        index: true

    tag:
      isEnabled: true
      pathname: 'tag'
      robots:
        index: false

    isRelatedPostsEnabled: true
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: null

ui:
  theme: 'dark'       # 强制深色模式，科技感拉满！
